name: Build MeloNX Custom

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true # Kích hoạt LFS
          submodules: recursive

      # BƯỚC QUAN TRỌNG: Ép buộc tải dữ liệu nhị phân thật của LFS
      - name: Force LFS Pull
        run: |
          git lfs install
          git lfs pull
          git lfs checkout

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build Dependencies
        run: |
          chmod +x distribution/ios/*.sh
          ./distribution/ios/get_dotnet.sh 

      - name: Build MeloNX for iOS (The Final Stand)
        run: |
          SRC_ROOT=$(pwd)/src/MeloNX
          
          # Dọn dẹp icon để tránh lỗi Asset cũ (vẫn giữ lại cho chắc)
          find src/MeloNX/MeloNX/Assets/Assets.xcassets -name "*.appiconset" ! -name "AppIcon.appiconset" -exec rm -rf {} +
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' src/MeloNX/MeloNX.xcodeproj/project.pbxproj
          
          # LỆNH BUILD VỚI ĐƯỜNG DẪN THƯ VIỆN ÉP BUỘC
          xcodebuild -project src/MeloNX/MeloNX.xcodeproj \
                     -scheme MeloNX \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     ASSETCATALOG_COMPILER_SKIP_APP_STORE_UTILIZATION=YES \
                     ACTOOL_VALIDATE_CONTENTS=NO \
                     ACTOOL_COMPILE_FOR_DEVICE_ONLY=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     SWIFT_COMPILATION_MODE=wholemodule \
                     LIBRARY_SEARCH_PATHS='$(inherited) '"${SRC_ROOT}"'/MeloNX/Dependencies/**' \
                     FRAMEWORK_SEARCH_PATHS='$(inherited) '"${SRC_ROOT}"'/MeloNX/Dependencies/**' \
                     HEADER_SEARCH_PATHS='$(inherited) '"${SRC_ROOT}"'/MeloNX/Dependencies/**' \
                     clean build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeloNX-iOS-App
          path: build/Build/Products/Release-iphoneos/*.app
