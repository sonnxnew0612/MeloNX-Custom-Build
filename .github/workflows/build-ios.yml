name: Build MeloNX Custom

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # Chuyển về macos-14 vì macos-15 (Xcode 16) đôi khi quá khắt khe với các dự án cũ
    runs-on: macos-14 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true 
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build Dependencies
        run: |
          chmod +x distribution/ios/*.sh
          ./distribution/ios/get_dotnet.sh 

      - name: Build MeloNX for iOS (Final Fix)
        run: |
          # Dùng xcodebuild với các thông số ép buộc cực hạn
          xcodebuild -project src/MeloNX/MeloNX.xcodeproj \
                     -scheme MeloNX \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     ASSETCATALOG_COMPILER_SKIP_APP_STORE_UTILIZATION=YES \
                     ACTOOL_VALIDATE_CONTENTS=NO \
                     ACTOOL_COMPILE_FOR_DEVICE_ONLY=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     SWIFT_COMPILATION_MODE=wholemodule \
                     GCC_PREPROCESS_DEFINITIONS='$GCC_PREPROCESS_DEFINITIONS JIT=1' \
                     OTHER_SWIFT_FLAGS="-suppress-warnings" \
                     clean build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeloNX-iOS-App
          path: build/Build/Products/Release-iphoneos/*.app
