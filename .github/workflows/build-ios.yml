name: Build MeloNX Custom

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15 # Sử dụng macOS 15 để có Xcode 16.2

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true 
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build Dependencies
        run: |
          chmod +x distribution/ios/*.sh
          ./distribution/ios/get_dotnet.sh 

      - name: Build MeloNX for iOS (Final Fix)
        run: |
          # Ép Xcode tìm header trong đúng thư mục Dependencies để sửa lỗi Bridging Header
          xcodebuild -project src/MeloNX/MeloNX.xcodeproj \
                     -scheme MeloNX \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     ASSETCATALOG_COMPILER_SKIP_APP_STORE_UTILIZATION=YES \
                     ACTOOL_VALIDATE_CONTENTS=NO \
                     ACTOOL_COMPILE_FOR_DEVICE_ONLY=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     HEADER_SEARCH_PATHS='$(inherited) ${SRCROOT}/MeloNX/Dependencies/**' \
                     FRAMEWORK_SEARCH_PATHS='$(inherited) ${SRCROOT}/MeloNX/Dependencies/**' \
                     SWIFT_COMPILATION_MODE=wholemodule \
                     clean build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeloNX-iOS-App
          path: build/Build/Products/Release-iphoneos/*.app
