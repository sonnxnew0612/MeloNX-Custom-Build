name: Build MeloNX Custom

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true 
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build Dependencies
        run: |
          chmod +x distribution/ios/*.sh
          ./distribution/ios/get_dotnet.sh 

      - name: Build MeloNX for iOS (The Final Strike)
        run: |
          SRC_ROOT=$(pwd)/src/MeloNX
          
          # --- BƯỚC QUAN TRỌNG NHẤT: TRỊ DỨT ĐIỂM ACTOOL ---
          # Xóa bỏ hoàn toàn thư mục Assets.xcassets gây lỗi Runtime Simulator
          # Xcode sẽ tự tạo ra một App trống không có icon, nhưng sẽ BUIL ĐƯỢC CODE
          rm -rf src/MeloNX/MeloNX/Assets/Assets.xcassets
          
          # Dùng sed để ép Xcode bỏ qua lỗi thiếu file Assets vừa xóa
          sed -i '' 's/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;//g' src/MeloNX/MeloNX.xcodeproj/project.pbxproj
          
          xcodebuild -project src/MeloNX/MeloNX.xcodeproj \
                     -scheme MeloNX \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     SWIFT_COMPILATION_MODE=wholemodule \
                     HEADER_SEARCH_PATHS="$(inherited) ${SRC_ROOT}/MeloNX/Dependencies/** ${SRC_ROOT}/MeloNX/App/Core/Headers/**" \
                     FRAMEWORK_SEARCH_PATHS="$(inherited) ${SRC_ROOT}/MeloNX/Dependencies/**" \
                     clean build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeloNX-iOS-App
          path: build/Build/Products/Release-iphoneos/*.app
