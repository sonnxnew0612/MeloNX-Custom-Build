name: Build MeloNX Custom

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15 # Sử dụng macOS 15 để có bộ SDK mới nhất ổn định hơn

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true 
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build Dependencies
        run: |
          chmod +x distribution/ios/*.sh
          ./distribution/ios/get_dotnet.sh 

      - name: Build MeloNX for iOS
        run: |
          # SỬA ĐỔI: Sử dụng tham số -sdk iphoneos để Xcode tự chọn bản SDK cao nhất hiện có trên server
          # Bỏ qua tham số -destination generic nếu nó gây lỗi nhận diện SDK
          xcodebuild -project src/MeloNX/MeloNX.xcodeproj \
                     -scheme MeloNX \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     ASSETCATALOG_COMPILER_SKIP_APP_STORE_UTILIZATION=YES \
                     ACTOOL_VALIDATE_CONTENTS=NO \
                     ACTOOL_COMPILE_FOR_DEVICE_ONLY=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     clean build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeloNX-iOS-App
          path: build/Build/Products/Release-iphoneos/*.app
