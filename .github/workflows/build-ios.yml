name: Build MeloNX iOS (IPA)

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch:     

jobs:
  build_ipa:
    runs-on: macos-14 

    steps:
      - name: Lấy Source Code
        uses: actions/checkout@v4

      - name: Cài đặt .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Bước 1 - Biên dịch Lõi giả lập C#
        run: |
          chmod +x distribution/ios/*.sh
          ./distribution/ios/compile.sh 

      - name: Bước 2 - Biên dịch Vỏ ứng dụng (MeloNX Frontend)
        run: |
          # Chui vào thư mục chứa project Xcode
          cd src/MeloNX
          # Gọi Xcode build app, ép bỏ qua bước kiểm tra chứng chỉ để cài cho TrollStore
          xcodebuild clean build -project MeloNX.xcodeproj -scheme MeloNX -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Bước 3 - Đóng gói thành file IPA
        run: |
          # Vào thư mục Xcode vừa nhả file .app ra
          cd src/MeloNX/build/Build/Products/Release-iphoneos
          
          # Tạo thư mục Payload (Chuẩn bắt buộc của file IPA)
          mkdir Payload
          
          # Di chuyển app vào Payload và nén zip lại
          mv MeloNX.app Payload/
          zip -qr MeloNX-Custom.ipa Payload
          
          # Đẩy file ipa ra ngoài cùng để dễ lấy
          mv MeloNX-Custom.ipa ../../../../../MeloNX-Custom.ipa

      - name: Lấy file IPA mang về
        uses: actions/upload-artifact@v7
        with:
          name: MeloNX-iOS-Release
          path: "MeloNX-Custom.ipa"